name: .NET 8 Build

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        
    - name: Restore dependencies
      run: dotnet restore src/GuillotineRay.csproj
      
    - name: Build
      run: dotnet build src/GuillotineRay.csproj --configuration Release --no-restore -o publish
      
    - name: Create Release Zip
      shell: pwsh
      run: |
        Compress-Archive -Path publish/* -DestinationPath GuillotineRay_Release.zip
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GuillotineRay-Build
        path: publish/

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: GuillotineRay_Release.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
